services:
  agent-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-hub:local
    ports:
      - "3000:80"
    restart: unless-stopped
    # 运行时环境变量 - 会在容器启动时注入到 config.js
    environment:
      - VITE_KAGENT_BASE_URL=http://192.168.3.211:8083
      - VITE_KAGENT_USER_ID=admin@kagent.dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
