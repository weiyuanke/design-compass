services:
  agent-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-hub:local
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
