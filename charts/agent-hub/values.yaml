# Default values for agent-hub

# 镜像配置
image:
  repository: docker.io/weiyuanke/agent-hub
  tag: "0.8.2"
  pullPolicy: IfNotPresent

# Kagent API 配置
kagent:
  # Kagent Controller 服务地址
  baseUrl: "http://192.168.3.211:8083"
  # 用户 ID
  userId: "admin@kagent.dev"

# 副本数
replicaCount: 1

# 服务配置
service:
  type: ClusterIP
  port: 80
  annotations: {}

# Ingress 配置
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agent-hub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# 资源限制
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 健康检查
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# 节点亲和性
nodeSelector: {}

tolerations: []

affinity: {}

# Pod 注解
podAnnotations: {}

# Pod 标签
podLabels: {}

# 安全上下文
podSecurityContext: {}

securityContext: {}

# 服务账号
serviceAccount:
  create: true
  annotations: {}
  name: ""
