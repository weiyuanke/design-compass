# 默认镜像：构建后推送到你的镜像仓库，并在此处覆盖 repository / tag
image:
  repository: docker.io/weiyuanke/agent-hub
  tag: 0.1
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

podAnnotations: {}
podLabels: {}

# podSecurityContext:
#   fsGroup: 2000
podSecurityContext: {}

# securityContext:
#   capabilities:
#     drop:
#       - ALL
#   readOnlyRootFilesystem: true
#   runAsNonRoot: true
#   runAsUser: 1000
securityContext: {}

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agent-hub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# HTTP 探针路径（nginx 默认返回 index.html）
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Kagent (k8s-agent) 配置
kagent:
  enabled: false
  # Kagent 服务根 URL，如 http://192.168.3.204:8080
  baseUrl: ""
  # Next.js server action 哈希（获取会话列表）
  nextActionList: ""
  # Next.js server action 哈希（创建会话）
  nextActionCreate: ""
  # 默认用户 ID
  userId: "admin@kagent.dev"
